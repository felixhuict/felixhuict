name: Wordle - Process Guess

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  process-guess:
    runs-on: ubuntu-latest
    if: startsWith(github.event.pull_request.title, 'guess:') || startsWith(github.event.pull_request.title, 'Guess:') || startsWith(github.event.pull_request.title, 'GUESS:')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract guess from PR title
        id: extract
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Extract the word after "guess:"
          WORD=$(echo "$PR_TITLE" | sed -n 's/^[Gg][Uu][Ee][Ss][Ss]: *\([A-Za-z]*\).*/\1/p' | tr '[:lower:]' '[:upper:]')
          echo "word=$WORD" >> "$GITHUB_OUTPUT"
          echo "player=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "Extracted guess: $WORD from player: $PR_AUTHOR"

      - name: Process guess
        id: guess
        continue-on-error: true
        run: |
          python game/wordle.py guess "${{ steps.extract.outputs.word }}" "${{ steps.extract.outputs.player }}"

      - name: Read result message
        id: result
        run: |
          if [ -f game/last_result.md ]; then
            {
              echo "message<<RESULT_EOF"
              cat game/last_result.md
              echo ""
              echo "RESULT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "message=Something went wrong processing your guess." >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const message = `${{ steps.result.outputs.message }}

            ---
            *🤖 This PR was automatically processed by GitHub Wordle. Your guess has been recorded and the game board has been updated!*

            *This PR will be closed automatically.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      - name: Commit and push updated game state
        if: steps.guess.outcome == 'success'
        run: |
          git config user.name "GitHub Wordle Bot"
          git config user.email "wordle-bot@users.noreply.github.com"
          git add README.md game/state.json game/leaderboard.json
          git diff --staged --quiet || git commit -m "🟩 Wordle guess: ${{ steps.extract.outputs.word }} by @${{ steps.extract.outputs.player }}"
          git push

      - name: Close PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
