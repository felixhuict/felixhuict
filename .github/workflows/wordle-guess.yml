name: Wordle - Process Guess

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  process-guess:
    runs-on: ubuntu-latest
    if: |
      !github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, 'guess:') ||
       startsWith(github.event.comment.body, 'Guess:') ||
       startsWith(github.event.comment.body, 'GUESS:'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract guess from comment
        id: extract
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          # Extract the word after "guess:" (first line only)
          FIRST_LINE=$(echo "$COMMENT_BODY" | head -n1)
          WORD=$(echo "$FIRST_LINE" | sed -n 's/^[Gg][Uu][Ee][Ss][Ss]: *\([A-Za-z]*\).*/\1/p' | tr '[:lower:]' '[:upper:]')
          echo "word=$WORD" >> "$GITHUB_OUTPUT"
          echo "player=$COMMENT_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "Extracted guess: $WORD from player: $COMMENT_AUTHOR"

      - name: Process guess
        id: guess
        continue-on-error: true
        run: |
          python game/wordle.py guess "${{ steps.extract.outputs.word }}" "${{ steps.extract.outputs.player }}"

      - name: Read result message
        id: result
        run: |
          if [ -f game/last_result.md ]; then
            {
              echo "message<<RESULT_EOF"
              cat game/last_result.md
              echo ""
              echo "RESULT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "message=Something went wrong processing your guess." >> "$GITHUB_OUTPUT"
          fi

      - name: Reply with result
        uses: actions/github-script@v7
        env:
          RESULT_MESSAGE: ${{ steps.result.outputs.message }}
        with:
          script: |
            const message = process.env.RESULT_MESSAGE + `\n\n---\n*🤖 Processed by GitHub Wordle*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      - name: Commit and push updated game state
        if: steps.guess.outcome == 'success'
        env:
          GUESS_WORD: ${{ steps.extract.outputs.word }}
          GUESS_PLAYER: ${{ steps.extract.outputs.player }}
        run: |
          git config user.name "GitHub Wordle Bot"
          git config user.email "wordle-bot@users.noreply.github.com"
          git add README.md game/state.json game/leaderboard.json
          git diff --staged --quiet || git commit -m "🟩 Wordle guess: $GUESS_WORD by @$GUESS_PLAYER"
          git push
