name: Wordle - Daily Reset

on:
  schedule:
    # Run every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reset game for new day
        run: python game/wordle.py reset

      - name: Commit and push
        run: |
          git config user.name "GitHub Wordle Bot"
          git config user.email "wordle-bot@users.noreply.github.com"
          git add README.md game/state.json
          git diff --staged --quiet || git commit -m "🔄 Daily Wordle reset"
          git push
