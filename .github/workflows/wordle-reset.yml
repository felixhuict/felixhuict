name: Wordle - Daily Reset

on:
  schedule:
    # Run every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reset game for new day
        run: python game/wordle.py reset

      - name: Commit and push
        run: |
          git config user.name "GitHub Wordle Bot"
          git config user.email "wordle-bot@users.noreply.github.com"
          git add README.md game/state.json
          git diff --staged --quiet || git commit -m "🔄 Daily Wordle reset"
          git push

      - name: Close previous day's issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'wordle',
              state: 'open',
            });

            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Create new daily issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const state = require('./game/state.json');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Wordle #${state.day} — ${today}`,
              labels: ['wordle'],
              body: [
                `## 🟩 Wordle #${state.day}`,
                '',
                'Comment your guess below:',
                '',
                '```',
                'guess: YOURWORD',
                '```',
                '',
                'For example: `guess: CRANE`',
                '',
                '### Rules',
                '- Words must be **exactly 5 letters** and in the valid word list',
                '- Players can guess **multiple times per day**',
                '- **6 total guesses** shared across all players — work together!',
                '- 🟩 Correct letter, correct position',
                '- 🟨 Correct letter, wrong position',
                '- ⬛ Letter not in the word',
                '',
                'Good luck!',
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              pinned: true,
            });
