name: Wordle Guess
description: Start a new Wordle game thread to submit guesses
title: "Wordle - Guess Here!"
labels: ["wordle"]
body:
  - type: markdown
    attributes:
      value: |
        ## How to Play

        Comment on this issue with your guess:

        ```
        guess: CRANE
        ```

        - Your word must be **exactly 5 letters** and in the valid word list.
        - Each player gets **1 guess per day**.
        - **6 total guesses** shared across all players — work together!

        The bot will reply with your result:
        - 🟩 Correct letter, correct position
        - 🟨 Correct letter, wrong position
        - ⬛ Letter not in the word

        Good luck!
